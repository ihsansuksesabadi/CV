<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Dashboard</title>

<!-- FAVICON -->
<link rel="icon" type="image/png" href="https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEgkxmjE5eVRlPo3BU2YJCg5gDd4tCsgaWWZ1YzmeycEmraU8K-o_04ekFOFHbYYj6Rl1ETsIo9E7BRvQbRClAEvu4xlwmmyiddkbqWkjN4ohc-z8HXkCpUfTgLe0eNJT-Cel3a8Tl2TKVEYfI_JW6oVNsVWpAwWIgK1R1FPao8-zR3TxwMT95I43i55_HM/s320/Picsart_25-11-20_14-16-19-838.png">

<meta name="viewport" content="width=device-width, initial-scale=1">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">


<style>
    body {
        font-family: 'Poppins', sans-serif;
        background: #f3f6fa;
        margin: 0;
        padding: 20px;
        color: #333;
    }
    .header { text-align: center; margin-bottom: 30px; }
    .header h1 { font-size: 32px; color: #FF6600; margin-bottom: 5px; }

    .filter-box {
        background: white;
        padding: 15px;
        border-radius: 10px;
        box-shadow: 0 4px 10px rgba(0,0,0,0.07);
        margin-bottom: 20px;
        display: flex;
        gap: 10px;
        align-items: center;
        flex-wrap: wrap;
    }
    .filter-box input {
        padding: 8px 12px;
        border-radius: 6px;
        border: 1px solid #ccc;
        font-size: 14px;
    }
    .filter-box button {
        padding: 8px 14px;
        background: #FF6600;
        color: white;
        border: none;
        cursor: pointer;
        border-radius: 6px;
        font-size: 14px;
        transition: background 0.3s;
    }
    .filter-box button:hover {
        background: #e65c00; /* hover tombol lebih gelap */
    }

    .dashboard-card {
        display: flex;
        gap: 20px;
        flex-wrap: wrap;
        margin-bottom: 20px;
    }
    .card {
        flex: 1;
        min-width: 200px;
        padding: 20px;
        background: white;
        border-radius: 14px;
        box-shadow: 0 6px 20px rgba(0,0,0,0.06);
        text-align: center;
    }
    .card h2 { font-size: 22px; margin-bottom: 8px; color: #FF6600; }
    .card p { font-size: 26px; font-weight: 600; margin: 0; }

    table {
        width: 100%;
        border-collapse: collapse;
        background: white;
        border-radius: 12px;
        overflow: hidden;
        box-shadow: 0 4px 15px rgba(0,0,0,0.07);
        transition: all 0.3s;
    }
    th {
        background: #FF6600;
        color: white;
        padding: 12px;
        text-align: left;
        cursor: pointer;
        user-select: none;
        transition: background 0.3s;
    }
    th:hover { background: #e65c00; }
    td { padding: 12px; border-bottom: 1px solid #eee; }
    tr:hover { background: #fff2e6; } /* hover baris tabel senada orange, lebih soft */
</style>

<!-- SHEETJS LIBRARY -->
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>

</head>
<body>

<div class="header">
    <h1>📊 Dashboard Admin</h1>
    <p>CV. Irshan Sukses Abadi</p>
</div>

<!-- DASHBOARD CARDS -->
<div class="dashboard-card">
    <div class="card">
        <h2>Total Pesanan</h2>
        <p id="totalOrders">0</p>
    </div>
    <div class="card">
        <h2>Total Pendapatan</h2>
        <p id="totalRevenue">Rp0</p>
    </div>
</div>

<!-- FILTER + DOWNLOAD -->
<div class="filter-box">
    <label>Dari:</label>
    <input type="date" id="dateStart">
    
    <label>Sampai:</label>
    <input type="date" id="dateEnd">

    <button onclick="applyDateFilter()">Filter</button>
    <button onclick="resetFilter()">Reset</button>
    <button onclick="downloadExcel()">Download Excel</button>
</div>

<!-- TABLE -->
<table id="dataTable">
    <thead>
        <tr>
            <th data-key="No.Pesanan">No. Pesanan</th>
            <th data-key="Waktu Pemesanan">Waktu Pemesanan</th>
            <th data-key="Nama Pemesan">Nama Pemesan</th>
            <th data-key="Nomor Whatsapp">Nomor WhatsApp</th>
            <th data-key="Daftar Pesanan">Daftar Pesanan</th>
            <th data-key="Total Harga">Total Harga</th>
            <th data-key="Catatan">Catatan</th>
        </tr>
    </thead>
    <tbody id="sheetData"></tbody>
</table>

<script>
let globalData = [];
let filteredData = [];
let sortState = {};

function parseDate(str) {
    if (!str) return 0;
    let [datePart, timePart] = str.split(" ");
    let [d, m, y] = datePart.split("/");
    return new Date(`${y}-${m}-${d} ${timePart}`).getTime();
}

async function loadSheet() {
    const SHEET_ID = "1j_Nk8RgtcUFCC9haLKjO4oNxZ6UKXi9bhxzZNEdfxmQ";
    const url = `https://opensheet.elk.sh/${SHEET_ID}/admin`;

    try {
        const response = await fetch(url);
        globalData = await response.json();

        globalData.sort((a, b) => parseDate(b["Waktu Pemesanan"]) - parseDate(a["Waktu Pemesanan"]));

        filteredData = [...globalData];
        renderTable(filteredData);
        calculateSummary(filteredData);

    } catch (error) {
        console.error("Gagal memuat data:", error);
    }
}

function calculateSummary(data) {
    let totalOrders = data.length;
    let totalRevenue = 0;

    data.forEach(row => {
        let harga = row["Total Harga"] ? row["Total Harga"].replace(/[^0-9]/g, "") : "0";
        totalRevenue += parseInt(harga) || 0;
    });

    document.getElementById("totalOrders").textContent = totalOrders;
    document.getElementById("totalRevenue").textContent = "Rp" + totalRevenue.toLocaleString("id-ID");
}

function renderTable(data) {
    let tbody = document.getElementById("sheetData");
    tbody.innerHTML = "";

    data.forEach(row => {
        let tr = document.createElement("tr");
        tr.innerHTML = `
            <td>${row["No.Pesanan"] || ""}</td>
            <td>${row["Waktu Pemesanan"] || ""}</td>
            <td>${row["Nama Pemesan"] || ""}</td>
            <td>${row["Nomor Whatsapp"] || ""}</td>
            <td>${row["Daftar Pesanan"] || ""}</td>
            <td>${row["Total Harga"] || ""}</td>
            <td>${row["Catatan"] || ""}</td>
        `;
        tbody.appendChild(tr);
    });
}

function applyDateFilter() {
    let start = document.getElementById("dateStart").value;
    let end = document.getElementById("dateEnd").value;

    let startTime = start ? new Date(start + " 00:00:00").getTime() : 0;
    let endTime = end ? new Date(end + " 23:59:59").getTime() : Infinity;

    filteredData = globalData.filter(row => {
        let rowDate = parseDate(row["Waktu Pemesanan"]);
        return rowDate >= startTime && rowDate <= endTime;
    });

    renderTable(filteredData);
    calculateSummary(filteredData);
}

function resetFilter() {
    document.getElementById("dateStart").value = "";
    document.getElementById("dateEnd").value = "";
    filteredData = [...globalData];
    renderTable(filteredData);
    calculateSummary(filteredData);
}

function sortByColumn(key) {
    const isDate = key === "Waktu Pemesanan";
    const isNumber = key === "Total Harga";

    sortState[key] = !sortState[key];
    const direction = sortState[key] ? 1 : -1;

    filteredData.sort((a, b) => {
        let valA = a[key] || "";
        let valB = b[key] || "";

        if (isDate) return direction * (parseDate(valA) - parseDate(valB));
        if (isNumber) {
            valA = parseInt(valA.replace(/[^0-9]/g, "")) || 0;
            valB = parseInt(valB.replace(/[^0-9]/g, "")) || 0;
            return direction * (valA - valB);
        }

        return direction * valA.localeCompare(valB);
    });

    renderTable(filteredData);
}

function downloadExcel() {
    if (filteredData.length === 0) {
        alert("Tidak ada data untuk di-download!");
        return;
    }

    const ws_data = [
        ["No. Pesanan", "Waktu Pemesanan", "Nama Pemesan", "Nomor WhatsApp", "Daftar Pesanan", "Total Harga", "Catatan"]
    ];

    filteredData.forEach(row => {
        ws_data.push([
            row["No.Pesanan"] || "",
            row["Waktu Pemesanan"] || "",
            row["Nama Pemesan"] || "",
            row["Nomor Whatsapp"] || "",
            row["Daftar Pesanan"] || "",
            row["Total Harga"] || "",
            row["Catatan"] || ""
        ]);
    });

    const wb = XLSX.utils.book_new();
    const ws = XLSX.utils.aoa_to_sheet(ws_data);
    XLSX.utils.book_append_sheet(wb, ws, "Data Penjualan");

    XLSX.writeFile(wb, "data_penjualan.xlsx");
}

document.querySelectorAll("th").forEach(th => th.addEventListener("click", () => {
    sortByColumn(th.dataset.key);
}));

loadSheet();
</script>

</body>
</html>
